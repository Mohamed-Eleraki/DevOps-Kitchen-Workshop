site_name: DevOps-Kitchen-Workshops
site_url: https://github.com/Mohamed-Eleraki/DevOps-Kitchen-Workshop
site_description: DevOps Kitchen Workshop community focuses on workshops, Workshops and Labs in general is a very important steps that advance your skills, as it's a self-paced study. we considered whether we should start learning together in a way that advance our experience while not wasting our time. by Crafting Multiple Workshops in multiple DevOps tools. The community is open-source which means any one have the ability to append workshops, provide online sessions, Get Admin privilege to groups (Slack, LinkedIn, and WhatsApp) However, To get the admin rule you should finish-up Three weeks of workshops on time.
copyright: Copyright &copy; 2026 DevOps Kitchen Workshop Team. All rights reserved.

repo_url: https://github.com/Mohamed-Eleraki/DevOps-Kitchen-Workshop
edit_uri: edit/main/docs/
repo_name: Mohamed-Eleraki/DevOps-Kitchen-Workshop

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      primary: blue
      accent: light blue
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      primary: blue
      accent: light blue
      scheme: slate
      toggle:
        icon: material/brightness-5
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.sidebar
    - navigation.collapse
    - navigation.autoCollapsed
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - header.autohide
    - content.code.copy
    - content.tabs.link
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono
extra_css:
  - stylesheets/extra.css


extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mohamed-Eleraki/DevOps-Kitchen-Workshop
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/DevOps-Kitchen-Workshop/
  version:
    provider: mike

# fetch date from docstring
plugins:
  - mkdocstrings # must install mkdocstrings first
  - mermaid2
  - search
  - autorefs

markdown_extensions:
  - admonition
  - pymdownx.details

nav:
  - Welcome: index.md
  - Cloud Providers:
      - AWS:
          - Overview: aws/index.md
          - Warm-up: aws/warm-up.md
          - Disable ACL: aws/s3-bucket-disable-acl.md
          - S3 Bucket - lifecycle: aws/s3-bucket-lifecycle.md
          - S3 Bucket - Conditional Access policy: aws/s3-bucket-conditional-access-policy.md
          - S3 Bucket - Object Encryption: aws/s3-bucket-object-encryption.md
          - S3 Bucket - Access Policy: aws/s3-bucket-access-policy-cli-comm.md
          - S3 Bucket - VPC Endpoint: aws/s3-bucket-vpc-endpoint.md
          - Single RDS Deployment: aws/single-rds-deployment.md
          - Multi-az RDS Deployment: aws/multi-az-rds-deployment.md
          - Advanced multi-az RDS Deployment: aws/advanced-multi-az-rds-deployment.md
          - Lambda Function - Manage File Transfers: aws/lambda.md
          - Lambda Function - Invoke SSM Document: aws/lambda-invoke-ssm-document.md
          - Lambda Function - URL Invoking: aws/lambda-url-invoking.md
          - Backend - HCP: aws/aws-backend-hcp.md
          - AWS Pipeline: aws/devsecops-checkov.md

      - CircleCI:
          - Overview: CircleCi/index.md
          - Automate TGW Deployment: CircleCi/automate-transit-gateway-deployment.md
          - Highly available design deployment: CircleCi/highly-available-design-deployment.md

      - AWS Python Boto3:
          - Overview: aws-python-boto3/index.md
          - Fetching AWS Resources: aws-python-boto3/fetching-aws-resource-details.md
          - AWS Boto3 S3 Calls: aws-python-boto3/s3-calls.md
          - AWS Python to Terraform: aws-python-boto3/python-to-terraform.md
          - AWS Python Package PyPi: aws-python-boto3/AWS-Python-Package-PyPi.md

      - GCP:
          - Overview: GCP/index.md
          - GCP Cloud Run Deployment: GCP/master-container-deployment.md



      - Azure:
          - Overview: azure/index.md
          - Manage Azure basic network components: azure/az-basic-networking.md
          - Azure DevOps - Branch Policies & Security: azure/az-devops-branch-policy-security.md
          - Azure DevOps - Environment: azure/az-devops-environment.md
